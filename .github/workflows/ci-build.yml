name: Build

# Reusable workflow: builds, type-checks, lints and tests on Node 24, then
# uploads the publishable output (dist/ + generated jsonschema/) as an artifact.
# Called by both ci.yml (on push) and publish.yml (on release).
on:
  workflow_call:
    inputs:
      upload-artifact:
        description: 'Upload the build output as an artifact for a downstream publish job.'
        type: boolean
        default: false

# Least privilege: this workflow only reads the repository.
permissions:
  contents: read

jobs:
  build:
    name: Build, lint, and test on Node 24
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Use Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        env:
          FORCE_COLOR: 0
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      # dist/ and jsonschema/ are git-ignored build output, so the publish job
      # consumes them via this artifact rather than rebuilding.
      - name: Upload package artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-dist
          path: |
            dist
            jsonschema
          retention-days: 1
          if-no-files-found: error
