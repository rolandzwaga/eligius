name: Publish Package to npmjs
on:
  workflow_dispatch:
  release:
    types: [created]

# Default to no privileges; each job opts into the minimum it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Reuse the exact same build/lint/test pipeline as CI, and have it upload the
  # publishable output so the publish job below doesn't rebuild.
  build:
    permissions:
      contents: read
    uses: ./.github/workflows/ci-build.yml
    with:
      upload-artifact: true

  publish:
    name: Publish to NPM registry
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing via OIDC (short-lived token,
      # no stored NPM secret) and provenance attestation.
      id-token: write

    steps:
      # Needed for package.json / README / LICENSE; dist + jsonschema come from
      # the build artifact below.
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Provides a recent npm (>= 11.5.1, required for OIDC trusted publishing)
      # and configures the npmjs registry.
      - name: Use Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Download build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-dist

      # No token: trusted publishing uses the OIDC id-token granted above.
      # Provenance is generated automatically.
      - name: Publish
        uses: JS-DevTools/npm-publish@0fd2f4369c5d6bcfcde6091a7c527d810b9b5c3f # v4.1.5
        with:
          strategy: all
